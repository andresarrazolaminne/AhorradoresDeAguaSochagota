# Laravel CDGF en SUBRUTA: https://tod.com.co/cdgf/
#
# No uses un server_name solo para el subdominio. Incluye este archivo
# DENTRO del bloque server { } que ya atiende tod.com.co, por ejemplo:
#
#   server {
#       listen 443 ssl http2;
#       server_name tod.com.co www.tod.com.co;
#       ...
#       include /etc/nginx/snippets/cdgf-laravel.conf;
#   }
#
# O copia los bloques location + upstream abajo dentro de ese server.
#
# Código Laravel: /usr/share/nginx/html/cdgf
# Web público Laravel: .../cdgf/public  (alias bajo /cdgf/)
#
# Ajusta el socket de PHP-FPM en upstream cdgf-php.

upstream cdgf-php {
    server unix:/var/run/php/php8.2-fpm.sock;
    # server unix:/var/run/php/php-fpm.sock;
    # server unix:/run/php-fpm/www.sock;
    # server 127.0.0.1:9000;
}

location = /cdgf {
    return 301 $scheme://$host/cdgf/;
}

location ^~ /cdgf/ {
    alias /usr/share/nginx/html/cdgf/public/;
    try_files $uri $uri/ @cdgf_laravel;
}

location @cdgf_laravel {
    rewrite ^/cdgf/(.*)$ /cdgf/index.php/$1 last;
}

location ~ ^/cdgf/index\.php(/.*)?$ {
    fastcgi_pass cdgf-php;
    fastcgi_split_path_info ^(/cdgf/index\.php)(/.*)?$;
    fastcgi_param SCRIPT_FILENAME /usr/share/nginx/html/cdgf/public/index.php;
    fastcgi_param SCRIPT_NAME /cdgf/index.php;
    fastcgi_param PATH_INFO $fastcgi_path_info;
    include fastcgi_params;
    fastcgi_hide_header X-Powered-By;
}
