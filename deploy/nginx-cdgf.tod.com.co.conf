# Nginx — cdgf.tod.com.co (Cazadores del Gasto Fantasma / Laravel)
# Copiar a: /etc/nginx/conf.d/cdgf.tod.com.co.conf   (RHEL/Alma/Rocky/CentOS)
#       o:  /etc/nginx/sites-available/cdgf.tod.com.co + enlace a sites-enabled (Debian/Ubuntu)
#
# IMPORTANTE: root = …/cdgf/public  (no uses solo …/cdgf)
#
# Tras colocar el archivo:
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (recomendado):
#   sudo certbot --nginx -d cdgf.tod.com.co
# Certbot suele añadir listen 443 y certificados; si prefieres TLS manual,
# descomentar el bloque server { listen 443 ... } más abajo y ajustar rutas PEM.

upstream php-fpm-cdgf {
    # Ajusta UNA línea según tu SO (ls /var/run/php/  o  ls /run/php-fpm/)
    server unix:/var/run/php/php8.2-fpm.sock;
    # server unix:/var/run/php/php-fpm.sock;
    # server unix:/run/php-fpm/www.sock;
    # server 127.0.0.1:9000;   # si PHP-FPM escucha por TCP
}

server {
    listen 80;
    listen [::]:80;
    server_name cdgf.tod.com.co;

    root /usr/share/nginx/html/cdgf/public;
    index index.php;

    charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Certbot / Let's Encrypt (webroot por si acaso)
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        default_type "text/plain";
        root /usr/share/nginx/html/cdgf/public;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass php-fpm-cdgf;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

